registry: "ghcr.io/fritzduchardt"

nginx:
  image: nginx
  tag: "1.29"
  imagePullPolicy: Always
  replicas: 1
  service:
    port: 80
    targetPort: 8080
  ingress:
    className: "nginx"
    host: fritzgpt.duchardt.net
    tlsSecretName: oneshot-certificate
    clusterIssuer: http01
  basicAuthSecret: oneshot-ui-basic-auth

oneshotUi:
  image: oneshot-ui
  tag: main
  imagePullPolicy: Always
  replicas: 1
  service:
    port: 3000
    targetPort: 3000
  env:
    - name: PORT
      value: "3000"
    - name: API_URL
      value: https://fritzgpt.duchardt.net/backend

oneshot:
  image: oneshot
  tag: main
  imagePullPolicy: Always
  replicas: 1
  service:
    port: 8000
    targetPort: 8000
  config:
    oneshotEnvFile: /app/.oneshot/.env
    envSecretName: oneshot-env-file
  env:
    - name: OS_CONFIG_ENV_FILE
      value: /app/.oneshot/.env
    - name: OS_CONFIG_PATTERN_DIR
      value: /app/.oneshot/patterns
    - name: OS_MARKDOWN_BASE_DIR
      value: /sync
    - name: OS_MARKDOWN_VAULT_DIR_1
      value: FritzSync/private
    - name: OS_MARKDOWN_VAULT_DIR_2
      value: BubaFritzShare/private
    - name: OS_PATTERN_TEMPLATE_DIR
      value: /sync/FritzSync/patterns
    - name: LOG_LEVEL
      value: info
    - name: MCP_URL
      value: http://oneshot-mcp:9000
    - name: WEAVIATE_HOST
      value: weaviate.weaviate
    - name: WEAVIATE_PORT
      value: "80"
    - name: WEAVIATE_GRPC_PORT
      value: "50051"
    - name: PORT
      value: "8000"
  nodeSelector:
    kubernetes.io/hostname: friclu-1
  host:
    syncDir: "/volumes/syncthing"

oneshotMcp:
  image: oneshot-mcp
  tag: main
  imagePullPolicy: Always
  replicas: 1
  service:
    port: 9000
    targetPort: 9000
  env:
    - name: OS_CONFIG_PATTERN_DIR
      value: /app/src/.oneshot/patterns
    - name: OS_MARKDOWN_BASE_DIR
      value: /sync
    - name: OS_MARKDOWN_VAULT_DIR_1
      value: FritzSync/private
    - name: OS_MARKDOWN_VAULT_DIR_2
      value: BubaFritzShare/private
    - name: LOG_LEVEL
      value: info
  nodeSelector:
    kubernetes.io/hostname: friclu-1
