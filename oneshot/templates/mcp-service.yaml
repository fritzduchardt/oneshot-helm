apiVersion: v1
kind: Service
metadata:
  name: oneshot-mcp
  labels:
    app.kubernetes.io/name: oneshot
    app.kubernetes.io/component: oneshot-mcp
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: oneshot
    app.kubernetes.io/component: oneshot-mcp
  ports:
    - name: http
      port: {{ .Values.oneshotMcp.service.port }}
      targetPort: {{ .Values.oneshotMcp.service.targetPort }}