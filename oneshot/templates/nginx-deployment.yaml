apiVersion: apps/v1
kind: Deployment
metadata:
  name: oneshot-nginx
  labels:
    app.kubernetes.io/name: oneshot
    app.kubernetes.io/component: nginx
spec:
  replicas: {{ .Values.nginx.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: oneshot
      app.kubernetes.io/component: nginx
  template:
    metadata:
      labels:
        app.kubernetes.io/name: oneshot
        app.kubernetes.io/component: nginx
    spec:
      containers:
        - name: nginx
          image: {{ include "dockerhub.image" (dict "image" .Values.nginx.image "tag" .Values.nginx.tag "Values" .Values) }}
          imagePullPolicy: {{ .Values.nginx.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.nginx.service.targetPort }}
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
            - name: nginx-basic-auth
              mountPath: /etc/nginx/auth/.htpasswd
              subPath: auth
      volumes:
        - name: nginx-config
          configMap:
            name: oneshot-nginx
        - name: nginx-basic-auth
          secret:
            secretName: {{ .Values.nginx.basicAuthSecret }}